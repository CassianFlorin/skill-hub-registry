name: Discover Candidate Skills

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Discover GitHub skill candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/discover_candidates.py \
            --use-default-github-queries \
            --output candidates/discovered.json \
            --report-json candidate-discovery-report.json

      - name: Run discovery tests
        run: python3 -m unittest tests/test_discover_candidates.py

      - name: Build discovery PR body
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("candidate-discovery-report.json").read_text(encoding="utf-8"))
          lines = [
              "## Summary",
              "",
              "Updates the discovered GitHub skill candidate pool. Candidates are not trusted registry entries yet; maintainers must review, scan, and intentionally ingest them before users can install them from the catalog.",
              "",
              f"- candidates: {report['candidate_count']}",
              f"- skipped existing registry sources: {report['skipped_existing_count']}",
              f"- GitHub query errors: {report.get('query_error_count', 0)}",
              "",
          ]
          if report.get("query_errors"):
              lines.extend(["## Query errors", ""])
              for error in report["query_errors"][:10]:
                  lines.append(f"- `{error['query']}` — {error['error'].splitlines()[0]}")
              if len(report["query_errors"]) > 10:
                  lines.append(f"- ...and {len(report['query_errors']) - 10} more query errors")
              lines.append("")
          if report.get("candidates"):
              lines.extend(["## Top candidates", ""])
              for candidate in report["candidates"][:25]:
                  lines.append(
                      f"- `{candidate['id']}` — {candidate['detected_format']}, "
                      f"license `{candidate['license']}`, stars `{candidate['stars']}`"
                  )
              if len(report["candidates"]) > 25:
                  lines.append(f"- ...and {len(report['candidates']) - 25} more candidates")
              lines.append("")
          lines.extend([
              "## Verification",
              "",
              "- `python3 scripts/discover_candidates.py --use-default-github-queries --output candidates/discovered.json --report-json candidate-discovery-report.json`",
              "- `python3 -m unittest tests/test_discover_candidates.py`",
              "",
              "Generated by the scheduled Discover Candidate Skills workflow.",
              "",
          ])
          Path("candidate-discovery-pr-body.md").write_text("\n".join(lines), encoding="utf-8")
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: candidate-discovery-report
          path: candidate-discovery-report.json

      - name: Open candidate discovery pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/discover-candidate-skills
          delete-branch: true
          title: "chore(registry): update discovered skill candidates"
          commit-message: "chore(registry): update discovered skill candidates"
          body-path: candidate-discovery-pr-body.md
          add-paths: |
            candidates/discovered.json
