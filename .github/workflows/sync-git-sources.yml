name: Sync Git Sources

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync git-backed skill metadata
        run: |
          python3 scripts/sync_git_sources.py \
            --cache-dir /tmp/skillhub-git-sources \
            --summary-json sync-summary.json

      - name: Validate registry metadata
        run: python3 scripts/validate_registry.py

      - name: Build sync PR body
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("sync-summary.json").read_text(encoding="utf-8"))
          lines = [
              "## Summary",
              "",
              "Synchronizes catalog metadata for git-backed skill entries from their upstream `skill.yaml` files.",
              "",
          ]
          if summary["changed_count"]:
              lines.extend(["## Updated skills", ""])
              for change in summary["changed"]:
                  fields = ", ".join(change["changed_fields"]) or "metadata"
                  old_version = change.get("old_version") or "-"
                  new_version = change.get("new_version") or "-"
                  lines.append(f"- `{change['identity']}`: `{old_version}` → `{new_version}` ({fields})")
              lines.append("")
          else:
              lines.extend(["No git-backed skill metadata changes were detected.", ""])
          if summary.get("failed_count"):
              lines.extend(["## Sync warnings", ""])
              for failure in summary["failed"]:
                  lines.append(f"- `{failure['identity']}` failed: {failure['error']}")
              lines.append("")
          if summary.get("skipped_count"):
              lines.extend(["## Skipped manual-metadata entries", ""])
              for skipped in summary["skipped"]:
                  lines.append(f"- `{skipped['identity']}`: {skipped['reason']}")
              lines.append("")
          lines.extend([
              "## Verification",
              "",
              "- `python3 scripts/sync_git_sources.py --summary-json sync-summary.json`",
              "- `python3 scripts/validate_registry.py`",
              "",
              "Generated by the scheduled Sync Git Sources workflow.",
              "",
          ])
          Path("sync-pr-body.md").write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Open sync pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-git-sources
          delete-branch: true
          title: "chore(registry): sync git-backed skill metadata"
          commit-message: "chore(registry): sync git-backed skill metadata"
          body-path: sync-pr-body.md
          add-paths: |
            skillhub.index.json

      - name: Fail on sync failures
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("sync-summary.json").read_text(encoding="utf-8"))
          failed_count = summary.get("failed_count", 0)
          if failed_count:
              for failure in summary.get("failed", []):
                  print(f"sync failed: {failure['identity']}: {failure['error']}")
              raise SystemExit(f"{failed_count} git-backed skill source(s) failed to sync")
          PY
