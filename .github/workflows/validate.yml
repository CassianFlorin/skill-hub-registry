name: Validate Registry

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run registry validator tests
        run: python3 -m unittest tests/test_validate_registry.py
      - name: Run git source sync tests
        run: python3 -m unittest tests/test_sync_git_sources.py
      - name: Run registry scanner tests
        run: python3 -m unittest tests/test_scan_registry.py
      - name: Validate registry metadata
        run: python3 scripts/validate_registry.py
      - name: Scan registry security and quality
        run: python3 scripts/scan_registry.py --report-json registry-scan-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: registry-scan-report
          path: registry-scan-report.json
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install skillhub from source
        run: |
          git clone https://github.com/CassianFlorin/skill-hub.git /tmp/skill-hub
          cd /tmp/skill-hub
          go build -o /usr/local/bin/skillhub ./cmd/skillhub
      - name: Smoke test registry with skillhub
        run: |
          tmp="$(mktemp -d)"
          export SKILLHUB_HOME="$tmp/home"
          mkdir -p "$tmp/project"
          cd "$tmp/project"
          skillhub init
          skillhub registry add local hub "$GITHUB_WORKSPACE"
          skillhub registry sync hub
          skillhub registry index validate hub
          skillhub catalog list --registry hub
          skillhub catalog featured --registry hub
          python3 - <<'PY' > "$tmp/skills.txt"
          import json
          import os
          from pathlib import Path

          index = json.loads(Path(os.environ["GITHUB_WORKSPACE"], "skillhub.index.json").read_text())
          for skill in index["skills"]:
              if skill.get("source", {}).get("type") == "registry":
                  print(skill["identity"])
          PY
          while IFS= read -r identity; do
            skillhub install "hub/$identity"
          done < "$tmp/skills.txt"
